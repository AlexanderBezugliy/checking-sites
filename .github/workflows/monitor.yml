name: Periodic Site Monitor

on:
    schedule:
        - cron: "*/5 * * * *" # Запуск каждые 5 минут (для теста)
    workflow_dispatch: # Позволяет запускать кнопкой из веб-интерфейса

concurrency:
    group: monitor
    cancel-in-progress: false

jobs:
    check-status:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Run monitoring script
              env:
                  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
              run: node monitor.js

            - name: Commit and push changes
              run: |
                  git config --global user.name "github-actions[bot]"
                    git config --global user.email "github-actions[bot]@users.noreply.github.com"
                    git add status.json
                    git diff-index --quiet HEAD || (git commit -m "chore: auto-update status [skip ci]" && git pull --rebase origin main && git push origin main)
